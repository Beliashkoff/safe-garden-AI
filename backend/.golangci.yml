version: "2"
run:
  go: "1.25"
linters:
  enable:
    - gocyclo
    - gosec
    - misspell
    - prealloc
    - revive
    - unconvert
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: var-naming
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Beliashkoff/safe-garden-AI/backend
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
