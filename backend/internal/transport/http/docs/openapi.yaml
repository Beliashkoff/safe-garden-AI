openapi: 3.0.3
info:
  title: Safe Garden AI Backend
  description: >
    Authentication and account API (stage 1.2). All endpoints are served under
    /v1. Bodies are JSON. Errors use the envelope in the Error schema
    (ARCHITECTURE.md §4.7). This spec is the source of truth for the mobile
    client.
  version: 0.1.0
servers:
  - url: https://api.agronomai.site/v1
    description: Production
  - url: http://localhost:8080/v1
    description: Local development
tags:
  - name: auth
    description: Sign-in, token lifecycle
  - name: account
    description: Current user profile
  - name: chat
    description: Single-conversation chat with streamed replies
  - name: uploads
    description: Presigned media uploads

paths:
  /auth/apple:
    post:
      tags: [auth]
      summary: Sign in with Apple
      description: Verifies an Apple id_token (with nonce) and signs the user in, creating or linking the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppleSignInRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignInResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/google:
    post:
      tags: [auth]
      summary: Sign in with Google
      description: Verifies a Google id_token and signs the user in, creating or linking the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleSignInRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignInResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/email/request:
    post:
      tags: [auth]
      summary: Request an email OTP
      description: >
        Issues and emails a 6-digit one-time code (valid 10 minutes). Limited to
        3 requests per hour per email. Returns 204 regardless of whether the
        address is already registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "204": { description: Code sent (if the address is valid) }
        "400": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/email/verify:
    post:
      tags: [auth]
      summary: Verify an email OTP
      description: Verifies a code (≤5 attempts per code) and signs the user in, creating the account on first use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerifyRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignInResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate the refresh token
      description: >
        Exchanges a refresh token for a new access+refresh pair. The presented
        token is revoked. Presenting a revoked/expired token revokes the whole
        token family and returns 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out
      description: Revokes the presented refresh token. Idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204": { description: Logged out }
        "400": { $ref: "#/components/responses/ValidationError" }

  /account:
    get:
      tags: [account]
      summary: Get the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [account]
      summary: Delete the current account
      description: Soft-deletes the account, revokes all refresh tokens, and writes an audit record. Media deletion happens asynchronously (stage 3).
      security:
        - bearerAuth: []
      responses:
        "204": { description: Account deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /messages:
    post:
      tags: [chat]
      summary: Send a message (streamed reply)
      description: >
        Saves the user message, then streams the assistant reply as
        Server-Sent Events. Stage 3.1 accepts `text` and `image_ref` blocks
        (≤4 images/message; the backend loads the photo from object storage,
        converts HEIC→JPEG, and sends it to the model). Event stream:
        `message_started {message_id}` → `delta {text}`* →
        (`tool_use`/`fertilizer_card`)? → `done {message_id, tokens_used:{in,out}}`;
        on failure an `error {code, message}` event is sent. Pre-stream errors
        (validation, rate limit, unknown/foreign image) are returned as a normal
        JSON Error instead.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostMessageRequest" }
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { $ref: "#/components/responses/ValidationError" }
        "415": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /messages/{id}:
    delete:
      tags: [chat]
      summary: Delete one of your messages
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /conversation:
    get:
      tags: [chat]
      summary: Get the conversation (latest page)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Conversation with the most recent messages
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /conversation/messages:
    get:
      tags: [chat]
      summary: Get older messages (keyset pagination)
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: A page of older messages
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagesPage" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /uploads/presign:
    post:
      tags: [uploads]
      summary: Get a presigned PUT URL for a photo upload
      description: >
        Validates content type (jpeg/png/webp/heic) and size (≤10 MB), then
        returns a presigned PUT URL (TTL 5 min). The client PUTs the file
        directly to object storage with the returned Content-Type header, then
        references `key` as an `image_ref` block in POST /messages.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresignRequest" }
      responses:
        "200":
          description: Presigned upload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PresignResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { $ref: "#/components/responses/ValidationError" }
        "415": { $ref: "#/components/responses/ValidationError" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    AppleSignInRequest:
      type: object
      required: [id_token, nonce]
      properties:
        id_token: { type: string }
        nonce: { type: string, description: The raw nonce echoed in the Apple id_token }

    GoogleSignInRequest:
      type: object
      required: [id_token]
      properties:
        id_token: { type: string }

    EmailRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    EmailVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: "^[0-9]{6}$", description: 6-digit code }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    SignInResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token: { type: string, description: JWT access token (RS256, ~15m) }
        refresh_token: { type: string, description: Opaque refresh token (~30d) }
        user: { $ref: "#/components/schemas/User" }

    RefreshResponse:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }

    AccountResponse:
      type: object
      required: [user]
      properties:
        user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      required: [id, email_verified, providers]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email, description: Omitted when unset }
        display_name: { type: string }
        email_verified: { type: boolean }
        providers:
          type: object
          required: [apple, google, email]
          properties:
            apple: { type: boolean }
            google: { type: boolean }
            email: { type: boolean }

    Error:
      type: object
      required: [error, request_id]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - unauthorized
                - forbidden
                - validation_failed
                - not_found
                - rate_limited
                - payload_too_large
                - unsupported_media_type
                - internal_error
            message: { type: string }
            details: { type: object, additionalProperties: true }
        request_id: { type: string }

    PostMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/ContentBlock" }

    ContentBlock:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, image_ref, audio_ref]
          description: "Stage 3.1: `text` + `image_ref` (≤4 images); `audio_ref` → 415 (Stage 4)."
        text: { type: string, description: "for type=text" }
        storage_key: { type: string, description: "for type=image_ref; key from POST /uploads/presign" }

    Message:
      type: object
      required: [id, role, status, created_at, content]
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        status: { type: string, enum: [pending, complete, cancelled, failed] }
        created_at: { type: string, format: date-time }
        content:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [text, image] }
              text: { type: string }
              storage_key: { type: string, description: "for type=image" }

    ConversationResponse:
      type: object
      required: [id, messages]
      properties:
        id: { type: string, format: uuid }
        messages:
          type: array
          items: { $ref: "#/components/schemas/Message" }
        next_cursor: { type: string }

    MessagesPage:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/Message" }
        next_cursor: { type: string }

    PresignRequest:
      type: object
      required: [content_type, size_bytes]
      properties:
        content_type: { type: string, enum: [image/jpeg, image/png, image/webp, image/heic] }
        size_bytes: { type: integer, format: int64, description: "1..10485760 (10 MB)" }

    PresignResponse:
      type: object
      required: [url, key, headers, expires_at]
      properties:
        url: { type: string, description: presigned PUT URL }
        key: { type: string, description: owner-scoped storage key for the image_ref block }
        headers:
          type: object
          additionalProperties: { type: string }
          description: headers the client must send on the PUT (e.g. Content-Type)
        expires_at: { type: string, format: date-time }
