version: "2"
sql:
  - engine: postgresql
    queries: internal/storage/queries
    schema: migrations
    gen:
      go:
        package: db
        out: internal/storage/db
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: false
        emit_pointers_for_null_types: false
        emit_exact_table_names: false
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: citext
            go_type: string
          - db_type: inet
            go_type:
              import: net/netip
              type: Addr
              pointer: true
