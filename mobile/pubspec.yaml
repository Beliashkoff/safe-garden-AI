name: agronom_ai
description: "ИИ Агроном — диагностика растений с помощью AI"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.0.0
  sign_in_with_apple: ^6.0.0
  google_sign_in: ^7.0.0
  crypto: ^3.0.0
  flutter_markdown_plus: ^1.0.7
  # drift codegen (drift_dev) shares source_gen with freezed; the project is on
  # freezed 2.5 (source_gen ^2), so drift is pinned to the last line that uses
  # source_gen ^2 (drift_dev >=2.28.2 moved to source_gen ^3). drift_flutter is
  # omitted on purpose — we open the database with NativeDatabase directly.
  drift: ">=2.24.0 <2.28.2"
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  # Photo attachments (stage 3.3): pick from camera/gallery, compress, request
  # runtime permissions.
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ">=2.24.0 <2.28.2"
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
